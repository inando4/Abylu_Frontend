<header class="abylu-topbar">
  <div class="topbar-inner">

    <a routerLink="/cotizacion" class="brand" (click)="cerrarMenu()">
      <img src="Abylu-Logo.webp" alt="Abylu" class="brand-logo"
           fetchpriority="high" decoding="async" />
    </a>

    <nav class="nav-desktop">
      <a routerLink="/cotizacion"
         routerLinkActive="active"
         class="nav-link">Nueva</a>
      <a routerLink="/historial"
         routerLinkActive="active"
         class="nav-link">Historial</a>
      @if (usuario(); as user) {
        @if (esInvitado()) {
          <span class="guest-chip" title="Estás explorando con datos de demostración">Modo invitado</span>
        } @else {
          <span class="user-chip" title="Sesión iniciada">{{ user }}</span>
        }
        <button type="button" class="nav-link logout-link" (click)="cerrarSesion()">Salir</button>
      }
    </nav>

    <button type="button"
            class="menu-toggle"
            [class.open]="menuAbierto"
            (click)="toggleMenu()"
            aria-label="Abrir menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  @if (menuAbierto) {
    <div class="menu-backdrop" (click)="cerrarMenu()"></div>
    <nav class="nav-mobile">
      <a routerLink="/cotizacion"
         routerLinkActive="active"
         class="nav-link"
         (click)="cerrarMenu()">Nueva</a>
      <a routerLink="/historial"
         routerLinkActive="active"
         class="nav-link"
         (click)="cerrarMenu()">Historial</a>
      @if (usuario(); as user) {
        @if (esInvitado()) {
          <span class="guest-chip guest-chip-mobile">Modo invitado</span>
        } @else {
          <span class="user-chip user-chip-mobile">{{ user }}</span>
        }
        <button type="button" class="nav-link logout-link" (click)="cerrarSesion()">Cerrar sesión</button>
      }
    </nav>
  }
</header>
